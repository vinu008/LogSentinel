version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw

  storage-service:
    build: ./storage-service
    depends_on:
      - kafka
      - clickhouse
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw
      CLICKHOUSE_HOST: clickhouse
      REDIS_HOST: redis

  anomaly-engine:
    build: ./anomaly-engine
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw
      ANOMALY_TOPIC: logs.anomalies
      REDIS_HOST: redis

  alert-dispatcher:
    build: ./alert-dispatcher
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANOMALY_TOPIC: logs.anomalies

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - storage-service

volumes:
  clickhouse_data:
