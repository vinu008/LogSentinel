version: "3.9"

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "29092:29092"

  ingestion-service:
    build: ./ingestion-service
    ports:
      - "8000:8000"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw

  storage-service:
    build: ./storage-service
    ports:
      - "8001:8001"
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw
      DB_PATH: /data/logs.db
      PYTHONUNBUFFERED: 1
    volumes:
      - sqlite_data:/data

  anomaly-engine:
    build: ./anomaly-engine
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: logs.raw
      ANOMALY_TOPIC: logs.anomalies

  alert-dispatcher:
    build: ./alert-dispatcher
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ANOMALY_TOPIC: logs.anomalies
      SLACK_WEBHOOK_URL: ""
      COOLDOWN_SECONDS: "60"

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"

volumes:
  sqlite_data:
